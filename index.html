<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>@ahmed_snde | Neon Glitch</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glitch-wrapper {
            text-align: center;
        }
        .btn {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 15px;
            background: transparent;
            color: #00f3ff;
            border: 2px solid #00f3ff;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            text-decoration: none;
            box-shadow: 0 0 10px #00f3ff;
        }
        .btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 40px #00f3ff, 0 0 80px #ff00ff;
            border-color: #ff00ff;
            transform: skew(-5deg);
        }
        .btn::after {
            content: 'ERROR_404';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ff00ff;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
        }
        .btn:hover::after {
            animation: glitch 0.3s infinite;
            opacity: 0.2;
        }
        @keyframes glitch {
            0% { clip-path: inset(10% 0 30% 0); transform: translate(-5px); }
            50% { clip-path: inset(40% 0 10% 0); transform: translate(5px); }
            100% { clip-path: inset(10% 0 30% 0); transform: translate(-5px); }
        }
    </style>
</head>
<body>
    <div class="glitch-wrapper">
        <h1 style="color: #ff00ff; text-shadow: 2px 2px #00f3ff;">@ahmed_snde</h1>
        <a href="#" class="btn">TELEGRAM</a>
        <a href="#" class="btn">GITHUB</a>
        <a href="#" class="btn">PROJECTS</a>
    </div>
</body>
</html>
