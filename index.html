<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@ahmed_snde | Terminal OS</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --terminal-green: #00ff41;
            --dark-core: #0a0a0b;
        }

        body {
            margin: 0;
            background-color: var(--dark-core);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Matrix Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            z-index: 10;
        }

        /* Profile Header */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border: 2px solid var(--neon-magenta);
            padding: 5px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 10px 0;
            color: white;
            text-shadow: 2px 2px var(--neon-magenta), -2px -2px var(--neon-cyan);
        }

        .typing-text {
            border-left: 2px solid var(--neon-cyan);
            padding-left: 10px;
            font-size: 0.8rem;
            margin-bottom: 40px;
            color: var(--terminal-green);
        }

        /* Cyber Buttons */
        .cyber-link {
            display: block;
            margin: 20px 0;
            padding: 15px;
            text-decoration: none;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0% 30%);
            transition: all 0.3s ease;
        }

        .cyber-link:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateX(-5px);
        }

        .cyber-link::after {
            content: " [CONNECTED]";
            font-size: 10px;
            opacity: 0;
        }

        .cyber-link:hover::after {
            opacity: 1;
        }

        /* Live HUD Elements */
        .hud-box {
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 10px;
            margin-top: 30px;
            font-size: 11px;
            text-align: left;
            position: relative;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin-top: 5px;
        }

        .loading-progress {
            width: 75%;
            height: 100%;
            background: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Glitch Effect on Click */
        .cyber-link:active {
            filter: hue-rotate(90deg);
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="profile-wrapper">
            <img src="https://via.placeholder.com/150/0a0a0b/ff00ff?text=AHMED" alt="Ahmed Snde" class="profile-img">
        </div>

        <h1>@ahmed_snde</h1>
        <div class="typing-text">> ACCESSING_SECURE_NODE... SUCCESS.</div>

        <a href="https://t.me/ahmed_snde" class="cyber-link">TELEGRAM_CHANNEL</a>
        <a href="https://github.com/ahmedsnde" class="cyber-link">SOURCE_CODE_DATA</a>
        <a href="#" class="cyber-link">ACTIVE_PROJECTS_V4</a>
        <a href="mailto:ahmed@snde.com" class="cyber-link">ESTABLISH_COMMUNICATION</a>

        <div class="hud-box">
            <span style="color: var(--neon-magenta);">[CPU_LOAD]</span> 42% 
            <div class="loading-bar"><div class="loading-progress" style="width: 42%;"></div></div>
            <br>
            <span style="color: var(--neon-magenta);">[MEMORY]</span> 12.4GB / 32GB
            <div class="loading-bar"><div class="loading-progress" style="width: 60%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan);"></div></div>
            <br>
            <span style="color: var(--terminal-green);">STATUS: SYSTEM_STABLE_V4.0</span>
        </div>
    </div>

    <script>
        // Simple Interaction logic
        console.log("Welcome Ahmed. System initialised.");
    </script>
</body>
</html>
